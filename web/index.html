<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DrJovo Local AI</title>
    <link rel="stylesheet" href="./static/style.css">
  </head>
  <body>
    <main>
      <div class="container">
        <div class="main_content">
          <div class="chat_space" id="chat_space">
            <p>Hello! This is the background UI for the local AI chat space. Eventually, this will resemble a typical back-and-forth text area with a place at the bottom to type out messages.</p>
          </div>
          <div class="input_space" id="input_space">
            <div class="input_group">
              <div contenteditable id="input_field"></div>
              <button id="send" onclick="SendMessage()">&#8618;</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./static/script.js"></script>
  </body>
</html>
